<form [formGroup]="formGroup" (ngSubmit)="onSubmit()" class="p-3">
  <div class="grid">

    <!-- MAPPING SECTION -->
    <div class="col-12">
      <p class="text-900 font-semibold mb-2">Mapping <span class="text-500 font-normal text-sm">(leave empty to match all)</span></p>
    </div>

    <div class="col-12 md:col-6">
      <div class="field">
        <label class="block text-900 font-medium mb-1">Branches</label>
        <p-multiSelect
          [options]="bankValues?.branchValues"
          formControlName="branchIds"
          optionLabel="value"
          optionValue="id"
          placeholder="All branches"
          [virtualScroll]="true"
          scrollHeight="300px"
          [virtualScrollItemSize]="50"
          [showToggleAll]="true"
          appendTo="body"
          class="w-full"
        ></p-multiSelect>
      </div>
    </div>

    <div class="col-12 md:col-6">
      <div class="field">
        <label class="block text-900 font-medium mb-1">Products</label>
        <p-multiSelect
          [options]="bankValues?.productValues"
          formControlName="productIds"
          optionLabel="value"
          optionValue="id"
          placeholder="All products"
          [virtualScroll]="true"
          scrollHeight="300px"
          [virtualScrollItemSize]="50"
          [showToggleAll]="true"
          appendTo="body"
          class="w-full"
        ></p-multiSelect>
      </div>
    </div>

    <div class="col-12 md:col-6">
      <div class="field">
        <label class="block text-900 font-medium mb-1">Form Check Types</label>
        <p-multiSelect
          [options]="formCheckOptions"
          formControlName="formCheckType"
          optionLabel="value"
          optionValue="id"
          placeholder="All form check types"
          appendTo="body"
          class="w-full"
        ></p-multiSelect>
      </div>
    </div>

    <div class="col-12 md:col-6">
      <div class="field">
        <label for="accountNumber" class="block text-900 font-medium mb-1">Account Number <span class="text-500 font-normal text-sm">(optional)</span></label>
        <input
          pInputText
          id="accountNumber"
          type="text"
          formControlName="accountNumber"
          class="w-full"
          placeholder="For account-specific mapping"
        />
      </div>
    </div>

    <!-- DIVIDER -->
    <div class="col-12"><hr class="my-2" /></div>

    <!-- SERIES CONFIGURATION -->
    <div class="col-12">
      <p class="text-900 font-semibold mb-2">Series Configuration</p>
    </div>

    <div class="col-12">
      <div class="field">
        <label for="seriesPattern" class="block text-900 font-medium mb-1">Series Pattern</label>
        <input
          pInputText
          id="seriesPattern"
          type="text"
          formControlName="seriesPattern"
          class="w-full"
          placeholder="e.g., CK####"
        />
      </div>
    </div>

    <div class="col-12 md:col-6">
      <div class="field">
        <label for="numberOfPadding" class="block text-900 font-medium mb-1">Number of Padding</label>
        <p-inputNumber
          id="numberOfPadding"
          formControlName="numberOfPadding"
          [showButtons]="true"
          [min]="1"
          class="w-full"
        ></p-inputNumber>
        <small class="p-error" *ngIf="formGroup.get('numberOfPadding')?.invalid && formGroup.get('numberOfPadding')?.touched">
          Must be greater than 0
        </small>
      </div>
    </div>

    <div class="col-12 md:col-6">
      <div class="field">
        <label for="startingSeries" class="block text-900 font-medium mb-1">Starting Series</label>
        <p-inputNumber
          id="startingSeries"
          formControlName="startingSeries"
          [showButtons]="true"
          [min]="0"
          class="w-full"
        ></p-inputNumber>
        <small class="p-error" *ngIf="formGroup.errors?.['startGreaterThanEnd']">
          Cannot be greater than Ending Series
        </small>
      </div>
    </div>

    <div class="col-12 md:col-6">
      <div class="field">
        <label for="endingSeries" class="block text-900 font-medium mb-1">Ending Series</label>
        <p-inputNumber
          id="endingSeries"
          formControlName="endingSeries"
          [showButtons]="true"
          [min]="0"
          class="w-full"
        ></p-inputNumber>
      </div>
    </div>

    <div class="col-12 md:col-6">
      <div class="field">
        <label for="warningSeries" class="block text-900 font-medium mb-1">Warning Series</label>
        <p-inputNumber
          id="warningSeries"
          formControlName="warningSeries"
          [showButtons]="true"
          [min]="0"
          class="w-full"
        ></p-inputNumber>
        <small class="p-error" *ngIf="formGroup.errors?.['warningLessThanStart']">
          Cannot be less than Starting Series
        </small>
        <small class="p-error" *ngIf="formGroup.errors?.['warningGreaterThanOrEqualEnd']">
          Must be less than Ending Series
        </small>
      </div>
    </div>

    <div class="col-12">
      <div class="field-checkbox flex align-items-center">
        <p-checkbox formControlName="isRepeating" [binary]="true" id="isRepeating" class="mr-2"></p-checkbox>
        <label for="isRepeating" class="text-900 font-medium">Is Repeating</label>
      </div>
    </div>

    <div class="col-12 flex justify-content-end mt-3">
      <button pButton type="button" label="Cancel" class="p-button-text mr-2" (click)="onClose()"></button>
      <button pButton type="submit" label="Save" [disabled]="!formGroup.valid" icon="pi pi-check"></button>
    </div>

  </div>
</form>
